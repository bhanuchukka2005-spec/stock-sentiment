version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app/backend   # live reload in dev
      - ./frontend:/app/frontend
    restart: unless-stopped

  # Uncomment to add Redis caching in future
