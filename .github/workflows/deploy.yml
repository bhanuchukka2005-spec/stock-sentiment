name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Only deploy if CI passes
    needs: []   # Add ci job name here once CI workflow is in same file

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service stock-sentiment-engine

# ── Setup instructions ─────────────────────────────────────────────────────
# 1. Create account at railway.app
# 2. Create new project → Deploy from GitHub repo
# 3. Add environment variable: NEWSAPI_KEY = your_key
# 4. Go to railway.app → Account Settings → Tokens → Create token
# 5. In GitHub repo → Settings → Secrets → New secret
#    Name: RAILWAY_TOKEN   Value: (paste token)
# 6. Push to main — Railway deploys automatically
