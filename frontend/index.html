<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Sentiment Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── Reset + Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060810;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: #00ff9c;
      text-shadow: 0 0 24px #00ff9c55;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .header p {
      color: #ffffff44;
      font-size: 13px;
      letter-spacing: 0.1em;
    }

    /* ── Search box ── */
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      background: #0d1117;
      border: 1px solid #00ff9c22;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00ff9c;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      caret-color: #00ff9c;
      letter-spacing: 0.1em;
    }
    .search-box input::placeholder { color: #ffffff22; }
    .search-box button {
      background: #00ff9c;
      color: #000;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }
    .search-box button:hover { box-shadow: 0 0 20px #00ff9c55; }
    .search-box button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Signal card ── */
    .signal-card {
      background: #0d1117;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
      border: 1px solid #ffffff0f;
      display: none;
    }
    .signal-card.visible { display: block; }

    .signal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .ticker-name {
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
    }
    .company-name {
      color: #ffffff44;
      font-size: 13px;
      margin-top: 4px;
    }
    .signal-badge {
      font-size: 13px;
      font-weight: 800;
      padding: 8px 20px;
      border-radius: 8px;
      letter-spacing: 0.12em;
    }
    .signal-badge.positive { background: #00ff9c22; color: #00ff9c; border: 1px solid #00ff9c44; }
    .signal-badge.negative { background: #ff6b6b22; color: #ff6b6b; border: 1px solid #ff6b6b44; }
    .signal-badge.neutral  { background: #ffd70022; color: #ffd700; border: 1px solid #ffd70044; }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: #0a0e1a;
      border: 1px solid #ffffff0a;
      border-radius: 8px;
      padding: 14px 16px;
      text-align: center;
    }
    .stat-label {
      color: #ffffff33;
      font-size: 10px;
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }
    .stat-value {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* ── Breakdown bars ── */
    .breakdown {
      margin-bottom: 28px;
    }
    .breakdown-title {
      color: #ffffff44;
      font-size: 10px;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .bar-label {
      width: 64px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .bar-label.positive { color: #00ff9c; }
    .bar-label.negative { color: #ff6b6b; }
    .bar-label.neutral  { color: #ffd700; }
    .bar-track {
      flex: 1;
      height: 6px;
      background: #ffffff0a;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(.22,1,.36,1);
    }
    .bar-fill.positive { background: #00ff9c; box-shadow: 0 0 8px #00ff9c88; }
    .bar-fill.negative { background: #ff6b6b; box-shadow: 0 0 8px #ff6b6b88; }
    .bar-fill.neutral  { background: #ffd700; box-shadow: 0 0 8px #ffd70088; }
    .bar-count { color: #ffffff55; font-size: 12px; width: 16px; text-align: right; }

    /* ── Headlines list ── */
    .headlines-title {
      color: #ffffff44;
      font-size: 10px;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    .headline-item {
      background: #0a0e1a;
      border: 1px solid #ffffff08;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: border-color 0.2s;
    }
    .headline-item:hover { border-color: #ffffff18; }
    .headline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .headline-dot.positive { background: #00ff9c; box-shadow: 0 0 6px #00ff9c; }
    .headline-dot.negative { background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b; }
    .headline-dot.neutral  { background: #ffd700; box-shadow: 0 0 6px #ffd700; }
    .headline-text { flex: 1; }
    .headline-title-text {
      font-size: 13px;
      color: #ffffffcc;
      line-height: 1.5;
      margin-bottom: 4px;
    }
    .headline-title-text a {
      color: inherit;
      text-decoration: none;
    }
    .headline-title-text a:hover { color: #00ff9c; }
    .headline-meta {
      font-size: 10px;
      color: #ffffff33;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .confidence-text {
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .confidence-text.positive { color: #00ff9c; }
    .confidence-text.negative { color: #ff6b6b; }
    .confidence-text.neutral  { color: #ffd700; }

    /* ── History section ── */
    .history-section {
      margin-top: 40px;
    }
    .section-title {
      color: #ffffff44;
      font-size: 10px;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
    }
    .history-item {
      background: #0d1117;
      border: 1px solid #ffffff08;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .history-item:hover {
      border-color: #00ff9c22;
      background: #0d1117ee;
    }
    .history-ticker { font-weight: 700; font-size: 14px; color: #fff; }
    .history-time { color: #ffffff33; font-size: 11px; }
    .history-signal {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 4px;
    }
    .history-signal.positive { background: #00ff9c18; color: #00ff9c; }
    .history-signal.negative { background: #ff6b6b18; color: #ff6b6b; }
    .history-signal.neutral  { background: #ffd70018; color: #ffd700; }

    /* ── Loading + error states ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: #00ff9c66;
      font-size: 13px;
      letter-spacing: 0.15em;
      display: none;
    }
    .loading.visible { display: block; }
    .error-msg {
      background: #ff6b6b12;
      border: 1px solid #ff6b6b33;
      color: #ff6b6b;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #00ff9c22; border-radius: 4px; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>◉ STOCK SENTIMENT ENGINE</h1>
    <p>// FINBERT · REAL-TIME NEWS · NLP ANALYSIS</p>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input
      type="text"
      id="tickerInput"
      placeholder="Enter ticker — TSLA, AAPL, INFY..."
      autocomplete="off"
      autofocus
    />
    <button id="analyzeBtn" onclick="analyze()">ANALYZE</button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Loading -->
  <div class="loading" id="loading">⟳ FETCHING HEADLINES AND RUNNING FINBERT...</div>

  <!-- Result card -->
  <div class="signal-card" id="resultCard">

    <!-- Signal header -->
    <div class="signal-header">
      <div>
        <div class="ticker-name" id="resTicker"></div>
        <div class="company-name" id="resCompany"></div>
      </div>
      <div class="signal-badge" id="resBadge"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">HEADLINES</div>
        <div class="stat-value" id="resCount"></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">AVG CONFIDENCE</div>
        <div class="stat-value" id="resConfidence"></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">POSITIVE</div>
        <div class="stat-value" style="color:#00ff9c" id="resPositive"></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">NEGATIVE</div>
        <div class="stat-value" style="color:#ff6b6b" id="resNegative"></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">NEUTRAL</div>
        <div class="stat-value" style="color:#ffd700" id="resNeutral"></div>
      </div>
    </div>

    <!-- Breakdown bars -->
    <div class="breakdown">
      <div class="breakdown-title">// SENTIMENT BREAKDOWN</div>
      <div class="bar-row">
        <span class="bar-label positive">Positive</span>
        <div class="bar-track"><div class="bar-fill positive" id="barPositive" style="width:0%"></div></div>
        <span class="bar-count" id="countPositive">0</span>
      </div>
      <div class="bar-row">
        <span class="bar-label negative">Negative</span>
        <div class="bar-track"><div class="bar-fill negative" id="barNegative" style="width:0%"></div></div>
        <span class="bar-count" id="countNegative">0</span>
      </div>
      <div class="bar-row">
        <span class="bar-label neutral">Neutral</span>
        <div class="bar-track"><div class="bar-fill neutral" id="barNeutral" style="width:0%"></div></div>
        <span class="bar-count" id="countNeutral">0</span>
      </div>
    </div>

    <!-- Headlines -->
    <div class="headlines-title">// ANALYZED HEADLINES</div>
    <div id="headlinesList"></div>

  </div>

  <!-- History -->
  <div class="history-section">
    <div class="section-title">// RECENT SEARCHES</div>
    <div id="historyList"></div>
  </div>

</div>

<script>
  const API = "";

  // ── Analyze ────────────────────────────────────────────────────────────────

  // Also trigger on Enter key in the input
  document.getElementById("tickerInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") analyze();
  });

  async function analyze() {
    const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();

    if (!ticker) {
      showError("Please enter a ticker symbol");
      return;
    }

    // Show loading, hide previous results and errors
    setLoading(true);
    hideError();
    document.getElementById("resultCard").classList.remove("visible");

    try {
      // fetch() sends a GET request to our backend
      // We wait for the response with "await" — pauses here until it comes back
      const response = await fetch(`${API}/analyze/${ticker}`);

      // If backend returned an error (404, 503, etc.), handle it
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.detail || "Analysis failed");
      }

      // Parse the JSON response body into a JavaScript object
      const data = await response.json();

      // Render the result into the page
      renderResult(data);

      // Refresh history to show this new search
      loadHistory();

    } catch (err) {
      showError(err.message);
    } finally {
      // Always hide loading whether it succeeded or failed
      setLoading(false);
    }
  }

  // ── Render result ──────────────────────────────────────────────────────────

  function renderResult(data) {
    // Fill in the ticker and company name
    document.getElementById("resTicker").textContent = data.ticker;
    document.getElementById("resCompany").textContent = data.company;

    // Signal badge — set text, class, and color
    const badge = document.getElementById("resBadge");
    badge.textContent = `● ${data.overall_signal.toUpperCase()}`;
    badge.className = `signal-badge ${data.overall_signal}`;

    // Stats
    document.getElementById("resCount").textContent = data.headline_count;
    document.getElementById("resConfidence").textContent =
      `${(data.avg_confidence * 100).toFixed(0)}%`;
    document.getElementById("resPositive").textContent = data.breakdown.positive;
    document.getElementById("resNegative").textContent = data.breakdown.negative;
    document.getElementById("resNeutral").textContent  = data.breakdown.neutral;

    // Breakdown bars
    // Bar width = (count / total) * 100%
    const total = data.headline_count;
    document.getElementById("barPositive").style.width =
      `${(data.breakdown.positive / total) * 100}%`;
    document.getElementById("barNegative").style.width =
      `${(data.breakdown.negative / total) * 100}%`;
    document.getElementById("barNeutral").style.width  =
      `${(data.breakdown.neutral  / total) * 100}%`;
    document.getElementById("countPositive").textContent = data.breakdown.positive;
    document.getElementById("countNegative").textContent = data.breakdown.negative;
    document.getElementById("countNeutral").textContent  = data.breakdown.neutral;

    // Headlines list
    const list = document.getElementById("headlinesList");
    list.innerHTML = ""; // clear previous results

    data.headlines.forEach((h) => {
      // For each headline, create a div with the dot, title, source, confidence
      const item = document.createElement("div");
      item.className = "headline-item";
      item.innerHTML = `
        <div class="headline-dot ${h.sentiment}"></div>
        <div class="headline-text">
          <div class="headline-title-text">
            <a href="${h.url}" target="_blank" rel="noreferrer">${h.title}</a>
          </div>
          <div class="headline-meta">
            <span>${h.source}</span>
            <span>${formatDate(h.published_at)}</span>
          </div>
        </div>
        <div class="confidence-text ${h.sentiment}">
          ${(h.confidence * 100).toFixed(0)}%
        </div>
      `;
      list.appendChild(item);
    });

    // Show the card
    document.getElementById("resultCard").classList.add("visible");

    // Smooth scroll to result
    document.getElementById("resultCard").scrollIntoView({ behavior: "smooth" });
  }

  // ── History ────────────────────────────────────────────────────────────────

  async function loadHistory() {
    try {
      const response = await fetch(`${API}/history?limit=8`);
      const data = await response.json();
      renderHistory(data);
    } catch (err) {
      // History failing shouldn't break the page — just skip it
      console.error("Could not load history:", err);
    }
  }

  function renderHistory(records) {
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    if (records.length === 0) {
      list.innerHTML = `<div style="color:#ffffff22;font-size:12px;padding:12px 0">No searches yet</div>`;
      return;
    }

    records.forEach((r) => {
      const item = document.createElement("div");
      item.className = "history-item";

      // Clicking a history item re-runs that search
      item.onclick = () => {
        document.getElementById("tickerInput").value = r.ticker;
        analyze();
      };

      item.innerHTML = `
        <div>
          <div class="history-ticker">${r.ticker}</div>
          <div class="history-time">${formatDate(r.created_at)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <span style="color:#ffffff44;font-size:12px">${r.headline_count} headlines</span>
          <span class="history-signal ${r.signal}">${r.signal.toUpperCase()}</span>
        </div>
      `;
      list.appendChild(item);
    });
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function setLoading(on) {
    document.getElementById("loading").classList.toggle("visible", on);
    document.getElementById("analyzeBtn").disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = `⚠ ${msg}`;
    el.classList.add("visible");
  }

  function hideError() {
    document.getElementById("errorMsg").classList.remove("visible");
  }

  function formatDate(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleString([], {
      month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }

  // Load history when page first opens
  loadHistory();
</script>
</body>
</html>
